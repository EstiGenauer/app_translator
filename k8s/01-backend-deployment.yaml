apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: estigenauer/app-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres-service:5432/translations"
        - name: TRANSLATOR_HOST
          value: "translator-service" 

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5

        readinessProbe:
          httpGet:
           path: /ready
           port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          
  
