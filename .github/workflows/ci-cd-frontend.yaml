name: CI Frontend

on:
  push:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'
  pull_request:
    branches: [main, ci-cd]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify files
        run: ls -la frontend/

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete
