name: ci-backend

"on":
  push:
    branches: [main, ci-cd]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'
  pull_request:
    branches: [main, ci-cd]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yaml'

jobs:
# =========================
# 1. UNIT TESTS
# =========================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run unit tests
        working-directory: backend
        run: npm test

      - name: Test summary
        run: echo "✅ Unit tests passed"

# =========================
# 2. BUILD DOCKER IMAGE
# =========================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: app-translator-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm app-translator-backend:${{ github.sha }} node --version
          echo "✅ Docker image works!"

# =========================
# 3. INTEGRATION TESTS
# =========================
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/ci-cd' ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Run tests with Docker Compose
        run: |
          docker compose -f docker-compose.test.yaml up \
            --abort-on-container-exit \
            --exit-code-from backend-test

      - name: Show logs
        if: always()
        run: docker compose -f docker-compose.test.yaml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yaml down -v

# =========================
# 4. PUSH TO DOCKERHUB
# =========================
  push:
    name: Push to DockerHub
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd') &&
      needs.build.result == 'success' &&
      (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUBTOKEN }}

      - name: Build and push (reusing cache from build job)
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/app-translator-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =========================
# 5. TAGGING
# =========================
  tagging:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: write
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ci-cd') &&
      needs.push.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=$(echo $LATEST_TAG | sed 's/v//')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}
          echo "✅ Tag ${{ steps.version.outputs.version }} created!"



# =========================
# 6. POST STAGE - NOTIFICATION
# =========================
  post-notification:
    name: Post-Action Notification
    runs-on: ubuntu-latest
    needs: [tagging] # ירוץ אחרי שכל השלבים הסתיימו
    if: always()    # מבטיח שהמייל יישלח גם במקרה של הצלחה וגם בכישלון
    steps:
      - name: Send Mail Summary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Report: ${{ github.repository }} - Status: ${{ github.event_name }}"
          to: Genauer1997@gmail.com # <--- תשני כאן למייל האמיתי שלך!
          from: "GitHub Actions CI"
          body: |
            The Pipeline for ${{ github.repository }} has finished.
            
            Run Status: ${{ github.event_name == 'push' && 'Push to Production' || 'Pull Request Review' }}
            Workflow Result: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            
            You can see the full logs and details here:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
