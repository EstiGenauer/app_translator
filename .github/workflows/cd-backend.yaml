deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push # מוודא שה-CD יתחיל רק אחרי שה-Image נדחף ל-Docker Hub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # מעבר לתיקיית הפרויקט בשרת
            cd ~/app-translator 
            
            # משיכת השינויים האחרונים מהקוד (אם צריך)
            git pull origin main
            
            # משיכת ה-Images החדשים מ-Docker Hub
            docker compose pull backend
            
            # הרמה מחדש של ה-Backend בלבד (או הכל) בצורה שקטה
            docker compose up -d --build backend
            
            # ניקוי Images ישנים שתופסים מקום
            docker image prune -f


